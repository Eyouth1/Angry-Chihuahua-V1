# Build VST3 plugins for macOS and Windows
name: Build VST3 (macOS & Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Install JUCE
        run: |
          mkdir -p ~/JUCE_Install
          cd ~/JUCE_Install
          curl -L https://github.com/juce-framework/JUCE/releases/download/8.0.13/JUCE-8.0.13-osx.zip -o JUCE.zip
          unzip -q JUCE.zip
          ls -la
          rm JUCE.zip

      - name: Verify Xcode Project
        run: |
          # Use the pre-generated Xcode project from the repo
          echo "Using existing Xcode project from Builds/MacOSX/"
          ls -la "Builds/MacOSX/Angry Chihuahua V1.xcodeproj" | head -5

      - name: Build macOS VST3
        run: |
          cd "${{ github.workspace }}"
          xcodebuild -project "Builds/MacOSX/Angry Chihuahua V1.xcodeproj" -scheme "Angry Chihuahua V1" -configuration Release

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: Angry-Chihuahua-V1-macOS
          path: "${{ github.workspace }}/Builds/MacOSX/build/Release/VST3/Angry*"

  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install JUCE
        shell: pwsh
        run: |
          cd C:\
          Invoke-WebRequest -Uri "https://github.com/juce-framework/JUCE/releases/download/8.0.13/JUCE-8.0.13-windows.zip" -OutFile JUCE.zip
          Expand-Archive -Path JUCE.zip -DestinationPath .
          if (Test-Path "JUCE-8.0.13") {
            if (Test-Path "JUCE") { Remove-Item -Path "JUCE" -Recurse -Force }
            Rename-Item -Path "JUCE-8.0.13" -NewName "JUCE" -Force
          }
          Remove-Item JUCE.zip

      - name: Verify Visual Studio Project
        shell: pwsh
        run: |
          # Use the pre-generated Visual Studio project from the repo
          Write-Host "Using existing Visual Studio project from Builds/VisualStudio2022/"
          Get-Item "Builds\VisualStudio2022\Angry Chihuahua V1.sln" | Select-Object FullName

      - name: Build Windows VST3
        shell: cmd
        run: |
          cd "${{ github.workspace }}\Angry Chihuahua V1"
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          msbuild "Builds\VisualStudio2022\Angry Chihuahua V1.sln" /p:Configuration=Release /p:Platform=x64

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: Angry-Chihuahua-V1-Windows
          path: "${{ github.workspace }}\\Builds\\VisualStudio2022\\x64\\Release\\VST3\\Angry*"
