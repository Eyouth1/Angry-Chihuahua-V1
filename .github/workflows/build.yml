# Build VST3 plugins for macOS and Windows
name: Build VST3 (macOS & Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Install JUCE
        run: |
          cd /Applications
          curl -L https://github.com/juce-framework/JUCE/releases/download/8.0.13/JUCE-8.0.13-osx.zip -o JUCE.zip
          unzip -q JUCE.zip
          mv JUCE-8.0.13 JUCE
          rm JUCE.zip

      - name: Fix JUCE paths in Xcode project
        run: |
          cd "${{ github.workspace }}"
          JUCE_PATH="/Applications/JUCE"
          sed -i '' "s|/Users/trevorking/Applications/JUCE|$JUCE_PATH|g" "Builds/MacOSX/Angry Chihuahua V1.xcodeproj/project.pbxproj"

      - name: Build macOS VST3
        run: |
          cd "${{ github.workspace }}"
          xcodebuild -project "Builds/MacOSX/Angry Chihuahua V1.xcodeproj" -scheme "Angry Chihuahua V1 - VST3" -configuration Release

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: Angry-Chihuahua-V1-macOS
          path: "${{ github.workspace }}/Builds/MacOSX/build/Release/VST3/Angry*"

  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install JUCE
        shell: pwsh
        run: |
          cd C:\
          Invoke-WebRequest -Uri "https://github.com/juce-framework/JUCE/releases/download/8.0.13/JUCE-8.0.13-windows.zip" -OutFile JUCE.zip
          Expand-Archive -Path JUCE.zip -DestinationPath .
          if (Test-Path "JUCE-8.0.13") {
            Rename-Item -Path "JUCE-8.0.13" -NewName "JUCE" -Force
          }
          Remove-Item JUCE.zip

      - name: Fix JUCE paths in Visual Studio project
        shell: pwsh
        run: |
          cd "${{ github.workspace }}"
          $JUCE_PATH = "C:\JUCE"
          (Get-Content "Builds\VisualStudio2022\Angry Chihuahua V1.sln") -replace "C:\\Users\\.*?\\Applications\\JUCE", $JUCE_PATH | Set-Content "Builds\VisualStudio2022\Angry Chihuahua V1.sln"

      - name: Build Windows VST3
        shell: cmd
        run: |
          cd "${{ github.workspace }}"
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          msbuild "Builds\VisualStudio2022\Angry Chihuahua V1.sln" /p:Configuration=Release /p:Platform=x64

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: Angry-Chihuahua-V1-Windows
          path: "${{ github.workspace }}\\Builds\\VisualStudio2022\\x64\\Release\\VST3\\Angry*"
