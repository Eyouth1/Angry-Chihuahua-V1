# Build VST3 plugins for macOS and Windows
name: Build VST3 (macOS & Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Install JUCE
        run: |
          mkdir -p ~/JUCE_Install
          cd ~/JUCE_Install
          curl -L https://github.com/juce-framework/JUCE/releases/download/8.0.13/JUCE-8.0.13-osx.zip -o JUCE.zip
          unzip -q JUCE.zip
          ls -la
          rm JUCE.zip

      - name: Generate Xcode Project
        run: |
          # Find the JUCE root directory (could be JUCE-8.0.13 or JUCE)
          if [ -d "$HOME/JUCE_Install/JUCE-8.0.13" ]; then
            JUCE_ROOT="$HOME/JUCE_Install/JUCE-8.0.13"
          else
            JUCE_ROOT="$HOME/JUCE_Install/JUCE"
          fi
          # Projucer is inside the .app bundle on macOS
          PROJUCER="$JUCE_ROOT/Projucer.app/Contents/MacOS/Projucer"
          echo "Using JUCE at: $JUCE_ROOT"
          echo "Projucer at: $PROJUCER"
          chmod +x "$PROJUCER"
          "$PROJUCER" --set-global-search-path osx "$JUCE_ROOT/modules"
          cd "${{ github.workspace }}/Angry Chihuahua V1"
          "$PROJUCER" --resave "Angry Chihuahua V1.jucer"

      - name: Build macOS VST3
        run: |
          cd "${{ github.workspace }}/Angry Chihuahua V1"
          xcodebuild -project "Builds/MacOSX/Angry Chihuahua V1.xcodeproj" -scheme "Angry Chihuahua V1" -configuration Release

      - name: Upload macOS VST3
        uses: actions/upload-artifact@v4
        with:
          name: Angry-Chihuahua-V1-macOS
          path: "${{ github.workspace }}/Angry Chihuahua V1/Builds/MacOSX/build/Release/VST3/Angry*"

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install JUCE
        shell: pwsh
        run: |
          cd C:\
          Invoke-WebRequest -Uri "https://github.com/juce-framework/JUCE/releases/download/8.0.13/JUCE-8.0.13-windows.zip" -OutFile JUCE.zip
          Expand-Archive -Path JUCE.zip -DestinationPath .
          if (Test-Path "JUCE-8.0.13") {
            if (Test-Path "JUCE") { Remove-Item -Path "JUCE" -Recurse -Force }
            Rename-Item -Path "JUCE-8.0.13" -NewName "JUCE" -Force
          }
          Remove-Item JUCE.zip

      - name: Generate Visual Studio Project
        shell: pwsh
        run: |
          # Find JUCE root
          if (Test-Path "C:\JUCE-8.0.13") {
            $JUCE_ROOT = "C:\JUCE-8.0.13"
          } else {
            $JUCE_ROOT = "C:\JUCE"
          }
          # Try Projucer.exe first, then Projucer
          if (Test-Path "$JUCE_ROOT\Projucer.exe") {
            $PROJUCER = "$JUCE_ROOT\Projucer.exe"
          } else {
            $PROJUCER = "$JUCE_ROOT\Projucer"
          }
          Write-Host "Using JUCE at: $JUCE_ROOT"
          Write-Host "Projucer at: $PROJUCER"
          Get-ChildItem -Path $JUCE_ROOT | Select-Object -First 10
          & "$PROJUCER" --set-global-search-path windows "$JUCE_ROOT\modules"
          cd "${{ github.workspace }}\Angry Chihuahua V1"
          & "$PROJUCER" --resave "Angry Chihuahua V1.jucer"

      - name: Build Windows VST3
        shell: cmd
        run: |
          cd "${{ github.workspace }}\Angry Chihuahua V1"
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" && ^
          msbuild "Builds\VisualStudio2022\Angry Chihuahua V1.sln" /p:Configuration=Release /p:Platform=x64

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: Angry-Chihuahua-V1-Windows
          path: "${{ github.workspace }}\\Angry Chihuahua V1\\Builds\\VisualStudio2022\\x64\\Release\\VST3\\Angry*"
